<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تبرع الآن | معاً للأمل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module" src="https://donorbox.org/widgets.js" async></script>
    
    <style>
        :root {
            --primary-color: #e91e63;
            --primary-hover: #d81b60;
            --bg-color: #f0f2f5;
            --whatsapp-green: #25D366;
            --whatsapp-dark: #128C7E;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            animation: fadeInPage 0.8s ease-out;
        }

        .donation-container {
            width: 100%; max-width: 450px;
            background: #fff; border-radius: 24px;
            overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin: 20px; animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }

        /* معرض الصور (Slider) */
        .slider-container {
            width: 100%; height: 250px; /* تم تقليل الارتفاع قليلاً ليتناسب مع نموذج التبرع */
            position: relative; background: #000;
        }
        .slider-track {
            display: flex; width: 100%; height: 100%;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.5); color: white; border: none;
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .btn-prev { right: 10px; }
        .btn-next { left: 10px; }

        .content-body { padding: 20px; text-align: center; }

        /* تخصيص مظهر Donorbox ليناسب موقعك */
        dbox-widget {
            margin-bottom: 20px;
            display: block;
            border-radius: 12px;
            overflow: hidden;
        }

        /* مربع الحوار */
        .animated-quote-box {
            background-color: #fffafb; border: 1px dashed #e91e63; border-radius: 15px;
            padding: 15px; margin: 15px 0; position: relative; overflow: hidden;
            display: flex; align-items: center; gap: 15px; text-align: right;
        }
        .quote-text { font-size: 13px; color: #555; z-index: 2; margin: 0; font-weight: 600; }

        /* واتساب ثابت */
        .whatsapp-fixed-footer { margin-top: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        .whatsapp-btn {
            background-color: var(--whatsapp-green); color: white; border-radius: 12px;
            padding: 12px; font-size: 16px; font-weight: bold; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }
        .whatsapp-btn:hover { background-color: var(--whatsapp-dark); }

        .footer-info { font-size: 10px; color: #999; margin-top: 10px; }

        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="donation-container">
    <div class="slider-container">
        <div class="slider-track" id="sliderTrack">
            <div class="slide"><img src="Jh.png" alt="1"></div>
            <div class="slide"><img src="Kk.png" alt="2"></div>
            <div class="slide"><img src="Kl.png" alt="3"></div>
            <div class="slide"><img src="Kn.png" alt="4"></div>
            <div class="slide"><img src="Km.png" alt="5"></div>
        </div>
        <button class="nav-btn btn-prev" onclick="moveSlide(-1)"><i class="fa fa-chevron-right"></i></button>
        <button class="nav-btn btn-next" onclick="moveSlide(1)"><i class="fa fa-chevron-left"></i></button>
    </div>

    <div class="content-body">
        
        <dbox-widget campaign="ahmed-mhadi" type="donation_form" enable-auto-scroll="true"></dbox-widget>

        <div class="animated-quote-box">
            <i class="fa-solid fa-hands-praying" style="color:#e91e63; font-size: 20px;"></i>
            <p class="quote-text">كل مساهمة منك هي أمل لمساعدة اسرة محتاجة.</p>
        </div>

        <div class="whatsapp-fixed-footer">
            <a href="https://wa.me/972592509307" class="whatsapp-btn" target="_blank">
                <i class="fa-brands fa-whatsapp"></i> للدعم الفني أو الاستفسار
            </a>
        </div>

        <div class="footer-info">
            <p>© 2024-2026 حملة عطاء الخيام</p>
        </div>
    </div>
</div>

<script>
    let currentSlide = 0;
    const track = document.getElementById('sliderTrack');
    const totalSlides = 5;

    function moveSlide(direction) {
        currentSlide = (currentSlide + direction + totalSlides) % totalSlides;
        track.style.transform = `translateX(${currentSlide * 100}%)`;
    }

    // تدوير الصور تلقائياً كل 5 ثوانٍ
    setInterval(() => moveSlide(1), 5000);
</script>

</body>
</html>
